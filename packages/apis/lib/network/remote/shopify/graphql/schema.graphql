}

enum WeightUnit {
  KILOGRAMS
  GRAMS
  POUNDS
  OUNCES
}

# Email Marketing Consent Enums
enum EmailMarketingConsentState {
  NOT_SUBSCRIBED
  SUBSCRIBED
  UNSUBSCRIBED
}

enum EmailMarketingConsentOptInLevel {
  SINGLE_OPT_IN
  DOUBLE_OPT_IN
  CONFIRMED_OPT_IN
}

# Webhook types
type WebhookSubscription {
  id: ID!
  topic: String!
  filter: String
  endpoint: WebhookEndpoint!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type WebhookSubscriptionsCount {
  count: Int!
  precision: String!
}

type WebhookSubscriptionConnection {
  edges: [WebhookSubscriptionEdge!]!
  pageInfo: PageInfo!
}

type WebhookSubscriptionEdge {
  node: WebhookSubscription!
  cursor: String!
}

interface WebhookEndpoint {
  __typename: String!
}

type WebhookHttpEndpoint implements WebhookEndpoint {
  __typename: String!
  callbackUrl: String!
}

type WebhookEventBridgeEndpoint implements WebhookEndpoint {
  __typename: String!
  arn: String!
}

type WebhookPubSubEndpoint implements WebhookEndpoint {
  __typename: String!
  pubSubProject: String!
  pubSubTopic: String!
}

# Webhook input types
input WebhookSubscriptionInput {
  callbackUrl: String
  format: WebhookSubscriptionFormat
  filter: String
  include_fields: [String!]
  metafield_namespaces: [String!]
}

# Webhook payload types
type WebhookSubscriptionCreatePayload {
  webhookSubscription: WebhookSubscription
  userErrors: [UserError!]!
}

type WebhookSubscriptionUpdatePayload {
  webhookSubscription: WebhookSubscription
  userErrors: [UserError!]!
}

type WebhookSubscriptionDeletePayload {
  deletedWebhookSubscriptionId: ID
  userErrors: [UserError!]!
}

# Webhook enums
enum WebhookSubscriptionTopic {
  ORDERS_CREATE
  ORDERS_DELETE
  ORDERS_UPDATE
  ORDERS_PAID
  ORDERS_CANCELLED
  ORDERS_FULFILLED
  ORDERS_PARTIALLY_FULFILLED
  CUSTOMERS_CREATE
  CUSTOMERS_DELETE
  CUSTOMERS_UPDATE
  PRODUCTS_CREATE
  PRODUCTS_DELETE
  PRODUCTS_UPDATE
  INVENTORY_LEVELS_UPDATE
  INVENTORY_ITEMS_CREATE
  INVENTORY_ITEMS_UPDATE
  INVENTORY_ITEMS_DELETE
  APP_UNINSTALLED
  CARTS_CREATE
  CARTS_UPDATE
  CHECKOUTS_CREATE
  CHECKOUTS_DELETE
  CHECKOUTS_UPDATE
  COLLECTIONS_CREATE
  COLLECTIONS_DELETE
  COLLECTIONS_UPDATE
  METAOBJECTS_CREATE
  METAOBJECTS_DELETE
  METAOBJECTS_UPDATE
}

enum WebhookSubscriptionFormat {
  JSON
  XML
}
