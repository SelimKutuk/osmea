type ImageConnection {
  edges: [ImageEdge!]!
  pageInfo: PageInfo!
}

type ImageEdge {
  node: Image!
  cursor: String!
}

type Image {
  id: ID!
  url: URL!
  altText: String
  width: Int
  height: Int
}

type OrderLineItemConnection {
  edges: [OrderLineItemEdge!]!
  pageInfo: PageInfo!
}

type OrderLineItemEdge {
  node: OrderLineItem!
  cursor: String!
}

type OrderLineItem {
  id: ID!
  title: String!
  quantity: Int!
