# Customer Address types
type CustomerAddressConnection {
  edges: [CustomerAddressEdge!]!
  pageInfo: PageInfo!
}

type CustomerAddressEdge {
  node: CustomerAddress!
  cursor: String!
}

type CustomerAddress {
  id: ID!
  address1: String
  address2: String
