# Shopify Admin API Schema
# This is a placeholder schema file - you should download the actual schema from:
# https://shopify.dev/docs/admin-api/graphql/reference

type Query {
  # Products
  products(first: Int, after: String, query: String): ProductConnection
  product(id: ID!): Product
  
  # Orders  
  orders(first: Int, after: String, query: String): OrderConnection
  order(id: ID!): Order
  
  # Customers
  customers(first: Int, after: String, query: String): CustomerConnection
  customer(id: ID!): Customer
  
  # Shop
  shop: Shop
  
  # Webhooks
  webhookSubscription(id: ID!): WebhookSubscription
  webhookSubscriptions(first: Int, after: String, query: String): WebhookSubscriptionConnection
  webhookSubscriptionsCount(query: String!): WebhookSubscriptionsCount
}

type Mutation {
  # Product mutations
  productCreate(input: ProductInput!): ProductCreatePayload
  productUpdate(input: ProductUpdateInput!): ProductUpdatePayload
  productDelete(input: ProductDeleteInput!): ProductDeletePayload
  
  # Order mutations
  orderUpdate(input: OrderUpdateInput!): OrderUpdatePayload
  
  # Customer mutations
  customerCreate(input: CustomerInput!): CustomerCreatePayload
  customerUpdate(input: CustomerUpdateInput!): CustomerUpdatePayload
  customerDelete(input: CustomerDeleteInput!): CustomerDeletePayload
  
  # Webhook mutations
  webhookSubscriptionCreate(topic: WebhookSubscriptionTopic!, webhookSubscription: WebhookSubscriptionInput!): WebhookSubscriptionCreatePayload
  webhookSubscriptionUpdate(id: ID!, webhookSubscription: WebhookSubscriptionInput!): WebhookSubscriptionUpdatePayload
  webhookSubscriptionDelete(id: ID!): WebhookSubscriptionDeletePayload
}

# Basic types - these should be replaced with actual Shopify schema
type Product {
  id: ID!
  title: String!
  description: String
  handle: String!
  status: ProductStatus!
  vendor: String
  productType: String
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  variants(first: Int): ProductVariantConnection!
  images(first: Int): ImageConnection!
}

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

type Order {
  id: ID!
  name: String!
  email: String
  phone: String
  createdAt: DateTime!
  updatedAt: DateTime!
  totalPrice: Money!
  subtotalPrice: Money!
  totalTax: Money!
  lineItems(first: Int): OrderLineItemConnection!
}

type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
}

type OrderEdge {
  node: Order!
  cursor: String!
}

type Customer {
  id: ID!
  firstName: String
  lastName: String
  email: String
  phone: String
  createdAt: DateTime!
  updatedAt: DateTime!
  acceptsMarketing: Boolean
  emailMarketingConsent: EmailMarketingConsent
  addresses(first: Int): CustomerAddressConnection!
  orders(first: Int): OrderConnection!
}

type CustomerConnection {
  edges: [CustomerEdge!]!
  pageInfo: PageInfo!
}

type CustomerEdge {
  node: Customer!
  cursor: String!
}

type Shop {
  id: ID!
  name: String!
  email: String!
  domain: String!
  myshopifyDomain: String!
  plan: ShopPlan!
  currencyCode: CurrencyCode!
}

# Common types
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Input types
input ProductInput {
  title: String!
  description: String
  handle: String
  vendor: String
  productType: String
  tags: [String!]
}

input ProductUpdateInput {
  id: ID!
  title: String
  description: String
  handle: String
  vendor: String
  productType: String
  tags: [String!]
}

input ProductDeleteInput {
  id: ID!
}

input CustomerInput {
  firstName: String
  lastName: String
  email: String
  phone: String
}

input CustomerUpdateInput {
  id: ID!
  firstName: String
  lastName: String
  email: String
  phone: String
}

input CustomerDeleteInput {
  id: ID!
}

input OrderUpdateInput {
  id: ID!
  note: String
}

# Payload types
type ProductCreatePayload {
  product: Product
  userErrors: [UserError!]!
}

type ProductUpdatePayload {
  product: Product
  userErrors: [UserError!]!
}

type ProductDeletePayload {
  deletedProductId: ID
  userErrors: [UserError!]!
}

type CustomerCreatePayload {
  customer: Customer
  userErrors: [UserError!]!
}

type CustomerUpdatePayload {
  customer: Customer
  userErrors: [UserError!]!
}

type CustomerDeletePayload {
  deletedCustomerId: ID
  userErrors: [UserError!]!
}

type OrderUpdatePayload {
  order: Order
  userErrors: [UserError!]!
}

type UserError {
  field: [String!]
  message: String!
}

# Enums
enum ProductStatus {
  ACTIVE
  ARCHIVED
  DRAFT
}

enum CurrencyCode {
  USD
  EUR
  GBP
  CAD
  AUD
  JPY
  TRY
}

enum WeightUnit {
  GRAMS
  KILOGRAMS
  OUNCES
  POUNDS
}

# Scalars
scalar DateTime
scalar Money
scalar Decimal
scalar URL
scalar HTML
scalar JSON

# Additional placeholder types
type ProductVariantConnection {
  edges: [ProductVariantEdge!]!
