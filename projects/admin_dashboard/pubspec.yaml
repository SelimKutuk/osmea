name: admin_dashboard
description: "Shopify Admin Dasboard App"


publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  core:
    path: ../../packages/core
  apis:
    path: ../../packages/apis

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  flavor: ^2.0.0
  get_it: ^7.7.0
  go_router: ^15.1.3
  injectable: ^2.5.0
  
  slang: ^4.7.3
  slang_flutter: ^4.7.0
  flutter_gen: ^5.10.0
  
  

dependency_overrides:
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  injectable_generator: 2.6.2
  build_runner: ^2.5.4
  slang_build_runner: ^4.7.0
  flutter_gen_runner: any

flutter_gen:
  output: lib/gen # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

flutter:
  assets:
    - assets/i18n/
    - assets/images/
  uses-material-design: true
